<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alchemy Idle: Discovery</title>
    <!-- Подключаем скрипт Telegram (ОБЯЗАТЕЛЬНО ДЛЯ WEB APP) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #00bfff;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --mana-color: #9d4edd;
            --cauldron-bg: #2d2a32;
        }

        body {
            margin: 0; padding: 10px; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-bg); padding: 10px 15px; border-radius: 12px; margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-shrink: 0;
        }

        .stat-box { font-size: 18px; font-weight: bold; }
        .mana { color: var(--mana-color); text-shadow: 0 0 5px rgba(157, 78, 221, 0.5); }

        .storage-bar-container {
            width: 120px; height: 20px; background: #333; border-radius: 10px;
            position: relative; overflow: hidden; border: 1px solid #555;
        }
        .storage-bar-fill {
            height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A);
            width: 0%; transition: width 0.3s;
        }
        .storage-text {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        #game-grid {
            display: flex; flex-direction: column; gap: 10px; flex-grow: 1; overflow: hidden;
        }

        .panel {
            background: var(--panel-bg); border-radius: 12px; padding: 15px;
            display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .panel-title { margin: 0 0 10px 0; font-size: 16px; color: var(--accent-color); border-bottom: 1px solid #333; padding-bottom: 5px; }

        .card {
            background: #2a2a2a; border-radius: 8px; padding: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3a;
        }

        button {
            background: var(--accent-color); color: #fff; border: none; padding: 8px 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }

        .btn-gather { background: #3a86ff; }
        .btn-brew { background: var(--mana-color); width: 100%; padding: 12px; font-size: 16px; }

        #inventoryContainer { display: flex; flex-wrap: wrap; gap: 5px; }
        .inv-item {
            background: #333; border: 1px solid #555; border-radius: 6px; padding: 5px 8px;
            font-size: 14px; display: flex; align-items: center; gap: 5px; cursor: pointer;
        }
        .inv-item.selected { border-color: var(--accent-color); background: #224455; }

        #cauldron-zone {
            background: var(--cauldron-bg); border-radius: 8px; padding: 10px; margin-top: auto;
            border: 2px dashed #555; text-align: center;
        }
        #cauldron-items { min-height: 40px; display: flex; justify-content: center; align-items: center; gap: 5px; margin-bottom: 10px; }
        
        .cauldron-item {
            background: #444; border-radius: 5px; padding: 3px 6px; font-size: 14px; display: flex; align-items: center; gap: 3px;
        }
        .cauldron-item span { cursor: pointer; color: #ff5555; font-weight: bold; margin-left: 5px; }

        .recipe-card {
            background: #2a2a2a; border-radius: 8px; padding: 10px; margin-bottom: 8px; border: 1px solid #3a3a3a;
        }
        .recipe-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .recipe-reqs { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .req-item { display: inline-block; background: #111; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        .req-item.ok { color: var(--success-color); }
        .req-item.bad { color: var(--danger-color); }

        #toast-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; margin-bottom: 5px; font-size: 14px; opacity: 0; transition: opacity 0.3s; border: 1px solid #555; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <header>
        <div class="stat-box" onclick="resetSave()" style="cursor: pointer;">Мана: <span id="manaDisplay" class="mana">0 🔮</span></div>
        <div class="storage-bar-container">
            <div id="storageFill" class="storage-bar-fill"></div>
            <div id="storageText" class="storage-text">Склад: 0 / 50</div>
        </div>
    </header>

    <div id="game-grid">
        <!-- Сбор сырья -->
        <div class="panel" style="flex: 1;">
            <h2 class="panel-title">Сбор Сырья</h2>
            <div style="overflow-y: auto; flex-grow: 1;">
                <div class="card"><div><span>💧</span> Вода</div><button class="btn-gather" onclick="gather('water')">Собрать</button></div>
                <div class="card"><div><span>🪨</span> Земля</div><button class="btn-gather" onclick="gather('dirt')">Собрать</button></div>
                <div class="card"><div><span>🌰</span> Семечко</div><button class="btn-gather" onclick="gather('seed')">Собрать</button></div>
            </div>
            
            <div style="margin-top: 10px; background: #2a2a2a; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #4CAF50;">
                <h3 style="margin: 0 0 5px 0; font-size: 14px;">Улучшение склада</h3>
                <p style="font-size: 11px; color: #aaa; margin: 0 0 8px 0;">Вместимость +25</p>
                <button id="btnUpgradeStorage" onclick="upgradeStorage()" style="width: 100%; background: #4CAF50; font-weight: bold; padding: 8px;">50 🔮</button>
            </div>
        </div>

        <!-- Склад и котел -->
        <div class="panel" style="flex: 1.2;">
            <h2 class="panel-title">Склад</h2>
            <div id="inventoryContainer" style="flex-grow: 1; overflow-y: auto; align-content: flex-start; margin-bottom: 10px;">
                <!-- Инвентарь -->
            </div>

            <div id="cauldron-zone">
                <h3 style="margin: 0 0 5px 0; font-size: 14px;">🧪 Котел Изучения</h3>
                <p style="font-size: 11px; color: #aaa; margin: 0 0 5px 0;">Добавьте предметы со склада</p>
                <div id="cauldron-items" style="flex-wrap: wrap;">Пусто</div>
                <div style="display: flex; gap: 5px;">
                    <button onclick="clearCauldron()" style="background: #555; flex: 1; padding: 8px;">Очистить</button>
                    <button class="btn-brew" onclick="brew()" style="flex: 2; padding: 8px;">Сварить!</button>
                </div>
            </div>
        </div>

        <!-- Рецепты -->
        <div class="panel" style="flex: 1.5;">
            <h2 class="panel-title">Рецепты</h2>
            <div id="recipesContainer" style="overflow-y: auto; flex-grow: 1;">
                <!-- Список рецептов -->
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const ITEMS = {
            'water': { name: 'Вода', icon: '💧', price: 1 },
            'dirt': { name: 'Земля', icon: '🪨', price: 1 },
            'seed': { name: 'Семечко', icon: '🌰', price: 2 },
            'sprout': { name: 'Росток', icon: '🌱', price: 8 },
            'root': { name: 'Корень', icon: '🥕', price: 10 },
            'clay': { name: 'Глина', icon: '🏺', price: 6 },
            'flask': { name: 'Пустая Колба', icon: '🫙', price: 25 },
            'flower': { name: 'Маг. Цветок', icon: '🌸', price: 30 },
            'hp_potion': { name: 'Зелье Жизни', icon: '❤️', price: 150 },
            'mana_potion': { name: 'Зелье Маны', icon: '💙', price: 200 }
        };

        const RECIPES = [
            { id: 'sprout', result: 'sprout', ingredients: { 'water': 1, 'seed': 1 }, autoCost: 50 },
            { id: 'root', result: 'root', ingredients: { 'dirt': 1, 'seed': 1 }, autoCost: 60 },
            { id: 'clay', result: 'clay', ingredients: { 'water': 2, 'dirt': 1 }, autoCost: 40 },
            { id: 'flower', result: 'flower', ingredients: { 'sprout': 1, 'dirt': 1 }, autoCost: 150 },
            { id: 'flask', result: 'flask', ingredients: { 'clay': 1, 'root': 1 }, autoCost: 120 },
            { id: 'hp_potion', result: 'hp_potion', ingredients: { 'flask': 1, 'flower': 1, 'water': 1 }, autoCost: 500 },
            { id: 'mana_potion', result: 'mana_potion', ingredients: { 'flask': 1, 'sprout': 1, 'water': 2 }, autoCost: 600 }
        ];

        let state = {
            mana: 0,
            storageMax: 50,
            storageUpgrades: 0,
            inventory: {},
            discoveredRecipes: [],
            autoCrafters: {}
        };

        let cauldron = {};
        
        // Флаг для контроля отправки на сервер
        let needsServerSync = false;

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function getUsedStorage() {
            let used = 0;
            for (let item in state.inventory) used += state.inventory[item];
            return used;
        }

        function saveGame() {
            localStorage.setItem('alchemyState', JSON.stringify(state));
            needsServerSync = true; // Отмечаем, что данные изменились и их нужно отправить на сервер
        }

        // --- НОВАЯ ФУНКЦИЯ ДЛЯ СВЯЗИ С СЕРВЕРОМ ---
        function saveGameToServer() {
            const BACKEND_URL = "https://kriogenka.pythonanywhere.com/api/save";
            
            fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mana: state.mana,
                    inventory: state.inventory
                })
            })
            .then(response => response.json())
            .then(data => console.log("Синхронизация с сервером успешна:", data))
            .catch(err => console.error("Ошибка API (сервер недоступен):", err));
        }
        // ------------------------------------------

        function loadGame() {
            const saved = localStorage.getItem('alchemyState');
            if (saved) {
                state = JSON.parse(saved);
                if(!state.storageMax) state.storageMax = 50;
                if(!state.storageUpgrades) state.storageUpgrades = 0;
            }
            updateUI();
        }

        function resetSave() {
            if(confirm("Сбросить весь прогресс?")) {
                localStorage.removeItem('alchemyState');
                location.reload();
            }
        }

        function gather(item) {
            if (getUsedStorage() >= state.storageMax) { showToast("Склад переполнен!"); return; }
            state.inventory[item] = (state.inventory[item] || 0) + 1;
            saveGame(); updateUI();
        }

        function upgradeStorage() {
            let cost = 50 + (state.storageUpgrades * 50);
            if (state.mana >= cost) {
                state.mana -= cost;
                state.storageMax += 25;
                state.storageUpgrades += 1;
                showToast("Склад расширен!");
                saveGame(); updateUI();
            } else {
                showToast("Недостаточно маны!");
            }
        }

        function addToCauldron(item) {
            if (!state.inventory[item] || state.inventory[item] <= 0) return;
            state.inventory[item]--;
            cauldron[item] = (cauldron[item] || 0) + 1;
            updateUI();
        }

        function removeFromCauldron(item) {
            if (!cauldron[item] || cauldron[item] <= 0) return;
            cauldron[item]--;
            if (cauldron[item] === 0) delete cauldron[item];
            state.inventory[item] = (state.inventory[item] || 0) + 1;
            updateUI();
        }

        function clearCauldron() {
            for (let item in cauldron) {
                state.inventory[item] = (state.inventory[item] || 0) + cauldron[item];
            }
            cauldron = {};
            updateUI();
        }

        function brew() {
            let cauldronKeys = Object.keys(cauldron);
            if (cauldronKeys.length === 0) { showToast("Котел пуст!"); return; }

            let matchedRecipe = null;
            for (let r of RECIPES) {
                let isMatch = true;
                let reqKeys = Object.keys(r.ingredients);
                
                if (cauldronKeys.length !== reqKeys.length) continue;

                for (let k of reqKeys) {
                    if (cauldron[k] !== r.ingredients[k]) { isMatch = false; break; }
                }

                if (isMatch) { matchedRecipe = r; break; }
            }

            if (matchedRecipe) {
                if (!state.discoveredRecipes.includes(matchedRecipe.id)) {
                    state.discoveredRecipes.push(matchedRecipe.id);
                    showToast("🌟 Открыт новый рецепт: " + ITEMS[matchedRecipe.result].name + "!");
                } else {
                    showToast("Вы сварили: " + ITEMS[matchedRecipe.result].name);
                }
                state.inventory[matchedRecipe.result] = (state.inventory[matchedRecipe.result] || 0) + 1;
                cauldron = {};
            } else {
                showToast("💥 Бульк! Ничего не вышло. Ингредиенты пропали.");
                cauldron = {};
            }
            saveGame(); updateUI();
        }

        function craft(recipeId) {
            let r = RECIPES.find(x => x.id === recipeId);
            if (!r) return;

            let itemsRemoved = 0;
            for (let req in r.ingredients) {
                if ((state.inventory[req] || 0) < r.ingredients[req]) { showToast("Не хватает ресурсов!"); return; }
                itemsRemoved += r.ingredients[req];
            }

            if (getUsedStorage() - itemsRemoved + 1 > state.storageMax) { showToast("Склад переполнен!"); return; }

            for (let req in r.ingredients) state.inventory[req] -= r.ingredients[req];
            state.inventory[r.result] = (state.inventory[r.result] || 0) + 1;
            
            saveGame(); updateUI();
        }

        function sellItem(item) {
            if (!state.inventory[item] || state.inventory[item] <= 0) return;
            state.inventory[item]--;
            let price = ITEMS[item].price;
            state.mana += price;
            saveGame(); updateUI();
        }

        function buyAuto(recipeId) {
            let r = RECIPES.find(x => x.id === recipeId);
            if (!r || state.mana < r.autoCost) { showToast("Не хватает маны!"); return; }
            state.mana -= r.autoCost;
            state.autoCrafters[recipeId] = true;
            showToast("Куплен авто-крафтер!");
            saveGame(); updateUI();
        }

        function updateUI() {
            document.getElementById('manaDisplay').innerText = state.mana + " 🔮";
            
            let usedStorage = getUsedStorage();
            document.getElementById('storageText').innerText = `Склад: ${usedStorage} / ${state.storageMax}`;
            document.getElementById('storageFill').style.width = Math.min((usedStorage / state.storageMax) * 100, 100) + '%';
            if(usedStorage >= state.storageMax) document.getElementById('storageFill').style.background = "linear-gradient(90deg, #f44336, #ff9800)";
            else document.getElementById('storageFill').style.background = "linear-gradient(90deg, #4CAF50, #8BC34A)";

            let upgCost = 50 + (state.storageUpgrades * 50);
            document.getElementById('btnUpgradeStorage').innerText = `Купить за ${upgCost} 🔮`;

            let invHTML = "";
            for (let item in state.inventory) {
                if (state.inventory[item] > 0) {
                    let info = ITEMS[item];
                    invHTML += `<div class="inv-item" onclick="addToCauldron('${item}')" title="Нажмите, чтобы добавить в котел">
                                    <span>${info.icon}</span> ${info.name}: <b>${state.inventory[item]}</b>
                                    <button style="margin-left: 5px; padding: 2px 5px; font-size: 10px; background: #888;" onclick="event.stopPropagation(); sellItem('${item}')">+${info.price}🔮</button>
                                </div>`;
                }
            }
            if (invHTML === "") invHTML = "<div style='color:#777; font-size: 14px;'>Склад пуст</div>";
            document.getElementById('inventoryContainer').innerHTML = invHTML;

            let cHTML = "";
            let cCount = 0;
            for (let item in cauldron) {
                if (cauldron[item] > 0) {
                    let info = ITEMS[item];
                    cHTML += `<div class="cauldron-item">${info.icon} x${cauldron[item]} <span onclick="removeFromCauldron('${item}')">✖</span></div>`;
                    cCount++;
                }
            }
            document.getElementById('cauldron-items').innerHTML = cCount > 0 ? cHTML : "Пусто";

            let recipesHTML = "";
            if (state.discoveredRecipes.length === 0) {
                recipesHTML = "<div style='color:#777; font-size: 14px; text-align:center;'>Экспериментируйте в котле!</div>";
            } else {
                RECIPES.forEach(recipe => {
                    if (state.discoveredRecipes.includes(recipe.id)) {
                        let resInfo = ITEMS[recipe.result];
                        
                        let reqsHTML = "";
                        let canCraft = true;
                        for (let req in recipe.ingredients) {
                            let rInfo = ITEMS[req];
                            let have = state.inventory[req] || 0;
                            let need = recipe.ingredients[req];
                            let statusClass = have >= need ? "ok" : "bad";
                            if (have < need) canCraft = false;
                            reqsHTML += `<span class="req-item ${statusClass}">${rInfo.icon} ${have}/${need}</span>`;
                        }

                        let autoBtnHTML = state.autoCrafters[recipe.id] ? 
                            `<button disabled style="background:#224455; color:#00bfff;">Автоматизировано</button>` :
                            `<button onclick="buyAuto('${recipe.id}')" style="background:#555;">Авто: ${recipe.autoCost}🔮</button>`;

                        recipesHTML += `<div class="recipe-card">
                                        <div class="recipe-header">
                                            <b>${resInfo.icon} ${resInfo.name}</b>
                                            <span style="font-size: 12px; color: var(--accent-color);">Цена: ${resInfo.price} 🔮</span>
                                        </div>
                                        <div class="recipe-reqs">${reqsHTML}</div>
                                        <div style="display: flex; gap: 5px;">
                                            <button style="flex:1;" onclick="craft('${recipe.id}')" ${!canCraft ? 'disabled' : ''}>Создать</button>
                                            ${autoBtnHTML}
                                        </div></div>`;
                    }
                });
            }
            document.getElementById('recipesContainer').innerHTML = recipesHTML;
        }

        // Авто-крафт (срабатывает раз в секунду)
        setInterval(() => {
            let stateChanged = false;
            RECIPES.forEach(recipe => {
                if (state.autoCrafters[recipe.id] && state.discoveredRecipes.includes(recipe.id)) {
                    let canCraft = true;
                    for (let req in recipe.ingredients) if ((state.inventory[req] || 0) < recipe.ingredients[req]) canCraft = false;
                    if (canCraft) {
                        let itemsRemoved = 0; for (let req in recipe.ingredients) itemsRemoved += recipe.ingredients[req];
                        if (getUsedStorage() - itemsRemoved + 1 <= state.storageMax) {
                            for (let req in recipe.ingredients) state.inventory[req] -= recipe.ingredients[req];
                            state.inventory[recipe.result] = (state.inventory[recipe.result] || 0) + 1;
                            stateChanged = true;
                        }
                    }
                }
            });
            if (stateChanged) { saveGame(); updateUI(); }
        }, 1000);

        // Таймер для отправки на сервер раз в 5 секунд (чтобы не спамить API)
        setInterval(() => {
            if (needsServerSync) {
                saveGameToServer();
                needsServerSync = false;
            }
        }, 5000);

        // Старт игры
        loadGame();
    </script>
</body>
</html>
