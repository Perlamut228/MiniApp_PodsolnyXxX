<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrap Web Client</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><h3 style="color: var(--accent);">Синхронизация...</h3></div>
    <div id="toast-container"></div>

    <div id="app">
        <aside id="sidebar">
            <div class="profile-info profile-box">
                <div class="avatar">🤖</div>
                <div class="username">Игрок</div>
            </div>
            <div class="resources-box">
                <div class="res-item res-sun"><span>🌻 Баланс</span> <span id="ui-sun">...</span></div>
                <div class="res-item res-dia"><span>💎 Алмазы</span> <span id="ui-dia">...</span></div>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="App.switchTab('farm')" data-tab="farm"><span>🏡</span> Сад</button>
                </nav>
        </aside>
        <div id="content-area">
            <main id="main-content"></main>
        </div>
    </div>

    <script src="js/state.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/farm.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
